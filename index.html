<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="/logo.jpeg" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Theme -->
  <meta name="theme-color" content="#0f6e56" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="VitalOS" />
  <link rel="apple-touch-icon" href="/logo.jpeg" />

  <!-- SEO -->
  <title>VitalOS — Your Health Operating System</title>
  <meta name="description" content="India's smartest preventive health app. Track lab reports, get AI insights, monitor family health, book doctors." />
  <meta name="keywords" content="health app India, lab report analysis, preventive health, AI health assistant, doctor booking" />

  <!-- Open Graph -->
  <meta property="og:title" content="VitalOS — Your Health Operating System" />
  <meta property="og:description" content="AI-powered preventive health platform for India" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://vitalos-six.vercel.app" />
  <meta property="og:image" content="/logo.jpeg" />

  <!-- Performance -->
  <link rel="preconnect" href="https://api.groq.com" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW error:', err))
      })
    }
  </script>
</body>
</html>
