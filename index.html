<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA -->
  <link rel="icon" type="image/png" href="/favicon.png" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#0f6e56" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="VitalOS" />

  <!-- Icons for iOS -->
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png" />
  <link rel="apple-touch-icon" sizes="144x144" href="/icon-144.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="/logo.jpeg" />

  <!-- SEO -->
  <title>VitalOS — Your Health Operating System</title>
  <meta name="description" content="India's smartest preventive health app. Track lab reports, get AI insights, monitor family health, book doctors." />
  <meta name="keywords" content="health app India, lab report analysis, preventive health, AI health assistant, doctor booking" />

  <!-- Open Graph -->
  <meta property="og:title" content="VitalOS — Your Health Operating System" />
  <meta property="og:description" content="AI-powered preventive health platform for India" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://vitalos.in" />

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://api.groq.com" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW error:', err))
      })
    }
  </script>
</body>
</html>
